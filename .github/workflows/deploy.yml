# .github/workflows/deploy.yml

name: Deploy to GitHub Pages

on:
  # 在推送到 main 分支时触发
  push:
    branches: ["main"]
  # 允许你从 Actions 标签页手动触发该工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 确保只有一个部署任务同时运行，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取项目代码
      - name: Checkout
        uses: actions/checkout@v4
      
      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      # 3. 安装项目依赖
      - name: Install dependencies
        run: npm ci
      
      # 4. 执行项目构建，生成静态文件
      - name: Build project
        run: npm run build
      
      # 5. 配置 GitHub Pages 环境
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      # 6. 上传构建产物（通常是 dist 文件夹）作为部署 artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      
      # 7. 执行部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4